profile = "mimarsinan-xlog1"

[sync]
include = [
  "run.py",
  "src/**",
  "spikingjelly/**",
  "sana_fe/**",
  "nevresim/**",
  "scripts/**",
  "tests/**",
  "templates/**",
  "test_configs/**",
  "requirements.txt",
  "pytest.ini",
  "datasets/MNIST/**",
]
exclude = [
  "**/__pycache__/**",
  "**/*.pyc",
  ".git/**",
  "env/**",
  "generated/**",
  "runs/**",
  "data/**",
  "**/*.pt",
  "**/*.pth",
]

[slurm]
partition = "gpu"
time = "02:00:00"
gres = "gpu:h100-47:1"
mem = "200G"
cpus_per_gpu = 40
nodes = 1

# The de-facto runtime env (the old mimarsinan_slurmech venv was relocated and
# its activate no longer takes effect; jobs were already running on this one).
[env]
mode = "reuse"
venv = "/home/y/yigit/imagenetshaq/env"

[pack]
parallelism = 1
fail_fast = true
kill_on_failure = true
