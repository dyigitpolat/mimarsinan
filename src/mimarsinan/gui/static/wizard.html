<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mimarsinan — Deployment Configurator</title>
  <link href="/static/vendor/fonts.css" rel="stylesheet">
  <link href="/static/wizard.css" rel="stylesheet">
  <link href="/static/pipeline-step-bar.css" rel="stylesheet">
  <link href="/static/hw-stats-panel.css" rel="stylesheet">
</head>

<body>

  <div class="app-shell" id="appShell">

    <div class="app-shell-top">
      <!-- ═══ HEADER ═══ -->
      <header class="header">
        <div class="logo-group">
          <div class="logo-mark">M</div>
          <div class="logo-text">Mimarsinan <span>Deployment Configurator</span></div>
        </div>
        <div class="header-actions">
          <a href="/"><button type="button" class="btn-sm">Home</button></a>
          <button class="btn-run" id="runBtn">RUN</button>
          <button class="btn-sm" id="saveTemplateBtn">Save as template</button>
          <button class="btn-sm" id="resetBtn">Reset</button>
          <div class="toggle-row" id="showJsonToggle" style="padding:6px 12px">
            <span class="toggle-label">JSON</span>
            <div class="toggle-switch"></div>
          </div>
          <button class="btn-sm primary" id="copyJsonBtn" style="display:none">Copy JSON</button>
          <button class="btn-sm" id="downloadJsonBtn" style="display:none">Download</button>
        </div>
      </header>

      <!-- ═══ PIPELINE STEP PREVIEW (edit & continue selects start step here) ═══ -->
      <div class="pipeline-steps-bar" id="pipelineStepsBar">
        <div class="pipeline-steps-top-row">
          <span class="pipeline-steps-label">Pipeline</span>
          <span class="pipeline-steps-hint" id="pipelineStepsHint"></span>
        </div>
        <div class="pipeline-steps-scroll">
          <div class="pipeline-steps-list" id="pipelineStepsList"></div>
        </div>
      </div>
    </div>

    <!-- ═══ WIZARD BODY (all sections render from /api/config_schema) ═══ -->
    <main class="wizard-panel" id="wizard">

      <!-- Template / edit-&-continue banner + diff-vs-defaults view -->
      <div id="templateBanner" class="template-banner" style="display:none"></div>

      <!-- Global (non-keyed) validation errors -->
      <div id="globalErrors" class="global-errors" style="display:none"></div>

      <div class="wizard-columns">
        <div class="wizard-column">
          <!-- 1 INTENT: workload / spiking / training / tuning knobs -->
          <div id="altitude-intent" data-altitude="intent"></div>
        </div>
        <div class="wizard-column">
          <!-- 2 PLATFORM: hardware grid + deployment target -->
          <div id="altitude-platform" data-altitude="platform"></div>

          <!-- Mapping feasibility (verify / auto-suggest) -->
          <div class="hw-validation-banner hide" id="hwValidationBanner"></div>
          <div id="hwStatsPanel" class="hw-stats-panel"></div>

          <!-- 3 REVIEW: derived chips, diff, unknown keys, deploy -->
          <div class="section open" data-section="review" id="reviewSection">
            <div class="section-header">
              <div class="section-icon cyan">✓</div>
              <div class="section-title-group">
                <div class="section-title">Review</div>
                <div class="section-subtitle">Derived values, differences, and deploy</div>
              </div>
            </div>
            <div class="section-body">
              <div class="sub-section-title">Derived</div>
              <div id="derivedChips" class="dep-bar"></div>
              <div class="sub-section-title">Differs from defaults</div>
              <div id="diffPanel" class="diff-panel"><div class="note">Nothing differs yet.</div></div>
              <div id="unknownTray" class="unknown-tray" style="display:none"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ═══ JSON PREVIEW PANEL ═══ -->
    <aside class="output-panel">
      <div class="output-header">
        <span class="output-title">Deployment Config</span>
      </div>
      <div class="json-scroll"><pre id="jsonOutput"></pre></div>
    </aside>

  </div>

  <script type="module" src="/static/js/wizard/main.js"></script>
</body>

</html>
