[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; Default profile: parallel (worksteal), quiet, no slow tests, 60 s per-test
; timeout. Opt into slow tests with ``pytest -m slow``.
addopts = --tb=short -m "not slow" -n auto --dist worksteal --timeout=60
markers =
    slow: marks tests as slow (deselect with '-m "not slow"', the project default)
    integration: marks integration tests that span multiple modules
