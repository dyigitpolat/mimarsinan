[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# ``-m "not slow"`` excludes Lava-graph-driving tests by default. Each
# such test pays Lava's full compile + spawn + run + stop cycle (~tens
# of seconds *per test*); opt in with ``pytest -m slow`` when actually
# validating Loihi parity. Without this default, a routine
# ``pytest tests/`` on this repo took 1h+ on the SubtractiveLIFReset
# and Loihi spike-parity files.
addopts = -v --tb=short -m "not slow"
markers =
    slow: marks tests as slow (deselect with '-m "not slow"', the project default)
    integration: marks integration tests that span multiple modules
